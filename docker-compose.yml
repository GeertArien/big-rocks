services:
  app:
    build: .
    image: clock-compass:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      # SQLite DB lives on the named volume so it survives restarts.
      DATABASE_URL: "file:/data/dev.db"
      # Leave API_AUTH_TOKEN empty for an open single-user instance (the default).
      # Set it (via your shell or a .env file) to require a bearer token on the
      # API; then enter the same token in the web UI's settings (gear icon).
      API_AUTH_TOKEN: "${API_AUTH_TOKEN:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - clock-compass-data:/data
    restart: unless-stopped

  # Optional Postgres for later. To use it: switch the Prisma provider to
  # "postgresql", point DATABASE_URL here, and re-run migrations.
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: clockcompass
  #     POSTGRES_PASSWORD: clockcompass
  #     POSTGRES_DB: clockcompass
  #   volumes:
  #     - clock-compass-pg:/var/lib/postgresql/data

volumes:
  clock-compass-data:
  # clock-compass-pg:
