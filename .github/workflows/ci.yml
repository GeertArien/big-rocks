name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Migrations/generation need a value; CI uses a throwaway local SQLite file.
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v5

      # pnpm via Corepack (respects the pinned packageManager in package.json).
      # Avoids pnpm/action-setup, which still runs on the deprecated Node 20.
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema & migrations
        run: |
          pnpm --filter @big-rocks/core exec prisma validate
          pnpm --filter @big-rocks/core exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
