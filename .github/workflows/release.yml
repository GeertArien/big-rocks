name: Release

# Build the production Docker image and publish it to GitHub Container Registry.
# - Pushes to `main` publish `:latest` (+ commit SHA).
# - Version tags (`v1.2.3`) publish `:1.2.3` and `:1.2`.
# - Can also be run on demand from the Actions tab.
#
# Uses the plain docker CLI (no JS Actions) to stay Node-20-free.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          set -euo pipefail
          # GHCR requires a lowercase image name.
          image="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          ref="${GITHUB_REF}"
          tags="-t ${image}:sha-${GITHUB_SHA::7}"
          if [ "${ref}" = "refs/heads/main" ]; then
            tags="${tags} -t ${image}:latest"
          fi
          case "${ref}" in
            refs/tags/v*)
              ver="${ref#refs/tags/v}"
              tags="${tags} -t ${image}:${ver} -t ${image}:${ver%.*}"
              ;;
          esac
          echo "Building tags:${tags}"
          docker build ${tags} .
          docker push --all-tags "${image}"
